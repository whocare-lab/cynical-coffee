<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Coffee cup body -->
  <rect x="7" y="13" width="16" height="13" rx="2" fill="#c8956c"/>
  <!-- Cup handle -->
  <path d="M23 16 Q28 16 28 20 Q28 24 23 24" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Saucer -->
  <ellipse cx="15" cy="27" rx="10" ry="2" fill="#a0714f"/>
  <!-- Terminal cursor inside cup -->
  <text x="10" y="23" font-family="monospace" font-size="8" fill="#1a1210" font-weight="bold">&gt;_</text>
  <!-- Steam / ">" prompt -->
  <path d="M10 6 L14 9 L10 12" fill="none" stroke="#c8956c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14 7 L18 10 L14 13" fill="none" stroke="#c8956c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
